<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>ユーザー一覧</title>
</head>
<body>
<h1>ユーザー一覧</h1>

<a href="/users/new">新規ユーザー登録</a>

<table border="1">
	<tr>
		<th>Id</th>
		<th>名前</th>
		<th>年齢</th>
	</tr>
	
	<tr th:each="user : ${users}">
		<td th:text="${user.id}"></td>
		<td th:text="${user.name}"></td>
		<td th:text="${user.age}"></td>
	</tr>
</table>

</body>
</html>
