<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: base(~{::title}, ~{::content})}">

<head>
    <meta charset="UTF-8">
    <title>ユーザー登録</title>
</head>

<div th:fragment="content">

    <h1>ユーザー登録</h1>

    <form th:action="@{/users/signup}" th:object="${user}" method="post" class="form-common">

        <div class="mb-3">
            <label>ログインID（username）:</label>
            <input type="text" th:field="*{username}" required>
        </div>

        <div class="mb-3">
            <label>パスワード:</label>
            <input type="password" th:field="*{password}" required>
        </div>

        <div class="mb-3">
            <label>名前:</label>
            <input type="text" th:field="*{name}" required>
        </div>

        <div class="mb-3">
            <label>年齢:</label>
            <input type="number" th:field="*{age}" required>
        </div>

        <button type="submit" class="btn btn-primary">登録</button>
    </form>

    <p class="mt-3">
        <a th:href="@{/login}" class="btn btn-secondary">ログイン画面へ戻る</a>
    </p>

</div>
