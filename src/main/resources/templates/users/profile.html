<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: base(~{::title}, ~{::content})}">

<head>
    <title>マイページ</title>
</head>

<div th:fragment="content">
	<div th:if="${success}" class="alert alert-success">
	    <span th:text="${success}"></span>
	</div>


    <div class="container py-4">

        <h1 class="mb-4">マイページ</h1>

        <!-- プロフィール表示 -->
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-primary text-white">
                プロフィール情報
            </div>
            <div class="card-body">
                <table class="table table-bordered mb-0">
                    <tr>
                        <th style="width: 150px;">会員番号</th>
                        <td th:text="${user.memberNumber}"></td>
                    </tr>
                    <tr>
                        <th>ユーザー名</th>
                        <td th:text="${user.username}"></td>
                    </tr>
                    <tr>
                        <th>名前</th>
                        <td th:text="${user.name}"></td>
                    </tr>
                    <tr>
                        <th>年齢</th>
                        <td th:text="${user.age}"></td>
                    </tr>
                </table>
            </div>
        </div>

        <!-- プロフィール編集フォーム（要件そのまま） -->
        <div class="card shadow-sm">
            <div class="card-header bg-secondary text-white">
                プロフィール編集
            </div>
            <div class="card-body">

                <form th:action="@{/users/profile/edit}" method="post">

                    <div class="mb-3">
                        <label class="form-label">名前：</label>
                        <input type="text" name="name" th:value="${user.name}" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">年齢：</label>
                        <input type="number" name="age" th:value="${user.age}" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">ユーザー名：</label>
                        <input type="text" name="username" th:value="${user.username}" class="form-control">
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        更新する
                    </button>

                </form>

            </div>
        </div>

    </div>

</div>
