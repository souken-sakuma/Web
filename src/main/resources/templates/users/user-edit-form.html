<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: base(~{::title}, ~{::content})}">

<head>
    <meta charset="UTF-8">
    <title>ユーザー編集</title>
</head>

<body>
<div th:fragment="content" class="container py-4">

    <h1 class="mb-4">ユーザー編集</h1>

    <form th:action="@{/users/edit}" th:object="${user}" method="post" class="card p-4 shadow-sm">

        <!-- ID（編集不可） -->
        <div class="mb-3">
            <label class="form-label">ID</label>
            <input type="text" th:field="*{id}" class="form-control" readonly>
        </div>

        <!-- 会員番号（編集不可） -->
        <div class="mb-3">
            <label class="form-label">会員番号</label>
            <input type="text" th:field="*{memberNumber}" class="form-control" readonly>
        </div>

        <!-- 名前 -->
        <div class="mb-3">
            <label class="form-label">名前</label>
            <input type="text" th:field="*{name}" class="form-control">
        </div>

        <!-- 年齢 -->
        <div class="mb-3">
            <label class="form-label">年齢</label>
            <input type="number" th:field="*{age}" class="form-control">
        </div>

        <!-- ユーザー名（編集不可） -->
        <div class="mb-3">
            <label class="form-label">ユーザー名</label>
            <input type="text" th:field="*{username}" class="form-control" readonly>
        </div>

        <!-- 権限（ADMIN / USER） -->
        <div class="mb-3">
            <label class="form-label">権限</label>
            <select th:field="*{role}" class="form-select">
                <option value="ROLE_USER">一般ユーザー</option>
                <option value="ROLE_ADMIN">管理者</option>
            </select>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">更新</button>
            <a href="/users/list" class="btn btn-secondary">戻る</a>
        </div>

    </form>

</div>
</body>
</html>
