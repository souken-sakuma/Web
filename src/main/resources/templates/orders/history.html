<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: base(~{::title}, ~{::content})}">

<head>
    <title>注文履歴</title>
</head>

<body>
<div th:fragment="content">

<h1>注文履歴</h1>

<table border="1">
    <tr>
        <th>注文日</th>
        <th>合計金額</th>
        <th>詳細</th>
    </tr>

    <tr th:each="order : ${orders}">
        <td th:text="${order.orderDate}"></td>
        <td th:text="${order.totalPrice}"></td>
        <td>
            <a th:href="@{|/orders/detail/${order.id}|}">詳細を見る</a>
        </td>
    </tr>
</table>

</div>
</body>
</html>
