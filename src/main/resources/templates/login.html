<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ログイン</title>
</head>
<body>
<h2>ログイン</h2>

<form th:action="@{/login}" method="post">
    <label>ユーザー名：</label>
    <input type="text" name="username" required><br>

    <label>パスワード：</label>
    <input type="password" name="password" required><br>

    <button type="submit">ログイン</button>
</form>

</body>
</html>
